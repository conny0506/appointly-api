services:
  postgres:
    image: postgres:17-alpine
    container_name: appointly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appointly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: appointly_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Database=appointly;Username=postgres;Password=postgres"
      Jwt__Secret: "local-dev-secret-change-me-0123456789abcdef"
    ports:
      - "8080:8080"

volumes:
  pgdata:
